{% extends "base.html" %}
{% block title %}Predict{% endblock %}

{% block content %}
<section class="page-header">
  <h1>Predict Price Sensitivity</h1>
  <p>Enter bike specifications to classify buyer price sensitivity</p>
</section>

<div class="predict-layout">
  <form id="predict-form" class="panel form-panel">
    <h2>Bike Details</h2>

    <div class="form-grid">
      <div class="form-group">
        <label for="brand">Brand</label>
        <select id="brand" name="brand" required>
          {% for b in options.brands %}
          <option value="{{ b }}">{{ b }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="segment">Segment</label>
        <select id="segment" name="segment" required>
          {% for s in options.segments %}
          <option value="{{ s }}">{{ s | capitalize }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="speedometer_type">Speedometer</label>
        <select id="speedometer_type" name="speedometer_type" required>
          {% for t in options.speedometer_types %}
          <option value="{{ t }}">{{ t }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="buyer_behaviour">Buyer Behaviour</label>
        <select id="buyer_behaviour" name="buyer_behaviour" required>
          {% for b in options.buyer_behaviours %}
          <option value="{{ b }}">{{ b }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="cc">Engine (cc)</label>
        <input type="number" id="cc" name="cc" value="200" min="50" max="2000" required>
      </div>

      <div class="form-group">
        <label for="year">Year</label>
        <input type="number" id="year" name="year" value="2023" min="2015" max="2026" required>
      </div>

      <div class="form-group">
        <label for="top_speed_kmh">Top Speed (km/h)</label>
        <input type="number" id="top_speed_kmh" name="top_speed_kmh" value="140" min="60" max="350" required>
      </div>

      <div class="form-group">
        <label for="mileage_kmpl">Mileage (km/l)</label>
        <input type="number" id="mileage_kmpl" name="mileage_kmpl" value="40" min="10" max="100" step="0.1" required>
      </div>

      <div class="form-group">
        <label for="fuel_tank_liters">Fuel Tank (L)</label>
        <input type="number" id="fuel_tank_liters" name="fuel_tank_liters" value="12" min="5" max="25" step="0.1" required>
      </div>

      <div class="form-group">
        <label for="factory_price_inr">Factory Price (₹)</label>
        <input type="number" id="factory_price_inr" name="factory_price_inr" value="120000" min="30000" step="1000" required>
      </div>

      <div class="form-group">
        <label for="gst_rate_pct">GST Rate (%)</label>
        <select id="gst_rate_pct" name="gst_rate_pct" required>
          {% for g in options.gst_rates %}
          <option value="{{ g }}">{{ g }}%</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="on_road_price_inr">On-Road Price (₹)</label>
        <input type="number" id="on_road_price_inr" name="on_road_price_inr" value="150000" min="40000" step="1000" required>
      </div>

      <div class="form-group">
        <label for="overall_score">Overall Score</label>
        <input type="number" id="overall_score" name="overall_score" value="70" min="0" max="100" required>
      </div>

      <div class="form-group">
        <label for="price_increase_scenario_pct">Price Increase Scenario (%)</label>
        <input type="number" id="price_increase_scenario_pct" name="price_increase_scenario_pct" value="5" min="0" max="30" step="0.1" required>
      </div>
    </div>

    <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
      Predict Sensitivity
    </button>
  </form>

  <div id="result-panel" class="panel result-panel hidden">
    <h2>Prediction Result</h2>
    <div id="prediction-badge" class="prediction-badge"></div>
    <p class="model-used">Model: <span id="model-name"></span></p>
    <h3>Probability Breakdown</h3>
    <div id="prob-bars" class="prob-bars"></div>
  </div>

  <div id="error-panel" class="panel error-panel hidden">
    <p id="error-message"></p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const SENS_COLORS = {{ sens_colors | tojson }};

  document.getElementById('predict-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Predicting...';

    const form = e.target;
    const data = Object.fromEntries(new FormData(form));

    try {
      const res = await fetch('/api/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const json = await res.json();

      document.getElementById('error-panel').classList.add('hidden');

      if (!res.ok) {
        throw new Error(json.error || 'Prediction failed');
      }

      const pred = json.prediction;
      const badge = document.getElementById('prediction-badge');
      badge.textContent = pred;
      badge.style.background = SENS_COLORS[pred] || '#2980b9';
      document.getElementById('model-name').textContent = json.model;

      const probContainer = document.getElementById('prob-bars');
      probContainer.innerHTML = '';
      const sorted = Object.entries(json.probabilities).sort((a, b) => b[1] - a[1]);
      for (const [label, prob] of sorted) {
        const pct = (prob * 100).toFixed(1);
        const row = document.createElement('div');
        row.className = 'prob-row';
        row.innerHTML = `
          <span class="prob-label" style="color:${SENS_COLORS[label] || '#333'}">${label}</span>
          <div class="prob-track"><div class="prob-fill" style="width:${pct}%;background:${SENS_COLORS[label] || '#2980b9'}"></div></div>
          <span class="prob-pct">${pct}%</span>
        `;
        probContainer.appendChild(row);
      }

      document.getElementById('result-panel').classList.remove('hidden');
    } catch (err) {
      document.getElementById('result-panel').classList.add('hidden');
      document.getElementById('error-panel').classList.remove('hidden');
      document.getElementById('error-message').textContent = err.message;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Predict Sensitivity';
    }
  });
</script>
{% endblock %}
