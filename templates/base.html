<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}BikeSelect{% endblock %} | The Edit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">Bike<span>Select</span></a>
    <div class="nav-links">
      <a href="/" class="{% if request.path == '/' %}active{% endif %}">Dashboard</a>
      <a href="/select" class="{% if request.path == '/select' %}active{% endif %}">Find Bike</a>
      <a href="/predict" class="{% if request.path == '/predict' %}active{% endif %}">Predict</a>
      <a href="/bikes" class="{% if request.path == '/bikes' %}active{% endif %}">Browse</a>
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>The Edit &mdash; Indian Motorcycles &mdash; {{ stats.rows if stats else '1000' }} Models Curated</p>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
