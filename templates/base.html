<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}BikeSelect{% endblock %} | Price Sensitivity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">Bike<span>Select</span></a>
    <div class="nav-links">
      <a href="/" class="{% if request.path == '/' %}active{% endif %}">Dashboard</a>
      <a href="/predict" class="{% if request.path == '/predict' %}active{% endif %}">Predict</a>
      <a href="/bikes" class="{% if request.path == '/bikes' %}active{% endif %}">Browse Bikes</a>
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>Indian Bikes Price Sensitivity ML &mdash; {{ stats.rows if stats else '1000' }} bikes classified</p>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
